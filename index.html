<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratório de Hardware: Anatomia Completa da Placa-Mãe</title>
    <style>
        :root {
            --bg-dark: #020617;
            --panel-bg: #0f172a;
            --text-main: #f1f5f9;
            --accent: #22d3ee;
            --highlight: #f472b6;
            --border-ui: #334155;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #radar {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(244, 114, 182, 0.9);
            color: #fff;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 16px;
            font-weight: bold;
            z-index: 9999;
            box-shadow: 0 0 15px var(--highlight);
            pointer-events: none;
        }

        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { color: var(--accent); text-transform: uppercase; letter-spacing: 3px; margin: 0; }
        
        .controls {
            background: var(--panel-bg);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--border-ui);
            margin-bottom: 25px;
            display: flex;
            gap: 15px;
            box-shadow: 0 0 20px rgba(34, 211, 238, 0.1);
            z-index: 10;
        }

        .btn-action {
            background: var(--accent);
            color: #020617;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-action:hover { filter: brightness(1.2); transform: scale(1.05); }

        .main-container {
            display: flex;
            width: 100%;
            max-width: 1000px;
            justify-content: center;
        }

        /* O Viewport agora centraliza o conteúdo perfeitamente */
        .viewport {
            position: relative;
            width: 100%;
            height: 75vh;
            min-height: 600px;
            overflow: hidden;
            border: 2px solid var(--accent);
            border-radius: 12px;
            background: #000;
            cursor: crosshair;
            box-shadow: 0 0 30px rgba(34, 211, 238, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* O Wrapper agora encolhe para abraçar examente o tamanho da imagem */
        .board-wrapper {
            position: relative;
            display: inline-block; 
            transition: transform 0.7s cubic-bezier(0.19, 1, 0.22, 1);
            transform-origin: center center;
        }

        /* Imagem sem cortes (sem object-fit cover) */
        .board-img { 
            max-width: 100%; 
            max-height: 75vh; 
            display: block; 
            opacity: 0.8; 
        }

        .hotspot {
            position: absolute;
            background: rgba(34, 211, 238, 0.2);
            border: 2px solid var(--accent);
            border-radius: 4px;
            cursor: pointer;
            transition: 0.3s;
            display: none;
        }

        .board-wrapper.ready .hotspot { display: block; }
        .hotspot:hover, .hotspot.active {
            background: rgba(244, 114, 182, 0.4);
            border-color: var(--highlight);
            box-shadow: 0 0 15px var(--highlight);
            z-index: 100;
        }

        .placeholder { text-align: center; color: var(--border-ui); position: absolute; }

        .tooltip {
            position: absolute;
            box-sizing: border-box; 
            background: rgba(15, 23, 42, 0.92);
            border: 1px solid var(--accent);
            border-radius: 12px;
            padding: 20px;
            width: 340px;
            z-index: 200;
            display: none;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8), 0 0 20px rgba(34, 211, 238, 0.2);
            transform: translateY(-100%);
            pointer-events: none; 
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from { opacity: 0; transform: translateY(-90%) scale(0.8); }
            to { opacity: 1; transform: translateY(-100%) scale(1); }
        }

        .tooltip::after {
            content: '';
            position: absolute;
            top: 100%;
            left: var(--arrow-pos, 50%); 
            margin-left: -10px;
            border-width: 10px;
            border-style: solid;
            border-color: rgba(15, 23, 42, 0.92) transparent transparent transparent;
            transition: left 0.3s ease; 
        }

        .tooltip.bottom-arrow {
            transform: translateY(0);
            animation: popInBottom 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popInBottom {
            from { opacity: 0; transform: translateY(10%) scale(0.8); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .tooltip.bottom-arrow::after {
            top: -20px;
            border-color: transparent transparent rgba(15, 23, 42, 0.92) transparent;
        }

        .tooltip h2 { color: var(--accent); margin: 0 0 10px 0; font-size: 1.4em; border-bottom: 2px solid var(--accent); padding-bottom: 8px; }
        .tooltip .section { margin-top: 12px; }
        .tooltip .label { color: var(--accent); font-weight: bold; text-transform: uppercase; font-size: 0.75em; display: block; margin-bottom: 4px; }
        .tooltip .curiosity .label { color: var(--highlight); }
        .tooltip p { margin: 0; font-size: 0.9em; line-height: 1.5; color: #cbd5e1; }

        /* ==========================================================
           AGORA ESSES VALORES VÃO OBEDECER MILIMETRICAMENTE O RADAR!
           ========================================================== */
        #h-cpu    { top: 25%; left: 32%; width: 22%; height: 18%; }
        #h-ram    { top: 18%; left: 66%; width: 14%; height: 46%; }
        #h-atx    { top: 29%; left: 81%; width: 5%; height: 19%; }
        #h-chip   { top: 72%; left: 67%; width: 14%; height: 11%; }
        #h-pcie   { top: 66%; left: 30%; width: 35%; height: 5%; }
        #h-pci    { top: 79%; left: 28%; width: 36%; height: 5%; }
        #h-bat    { top: 51%; left: 27%; width: 8%; height: 7%; }
        #h-sata   { top: 84%; left: 63%; width: 15%; height: 5%; }
        #h-io     { top: 15%; left: 10%; width: 13%; height: 48%; }
        #h-cpupwr { top: 22%; left: 14%; width: 7%; height: 7%; }
        #h-ide    { top: 68%; left: 80%; width: 4%; height: 21%; }
        #h-caps   { top: 31%; left: 24%; width: 6%; height: 15%; }
        #h-traces { top: 50%; left: 45%; width: 10%; height: 10%; border-radius: 50%; }
        #h-front  { top: 85%; left: 78%; width: 10%; height: 5%; }
        #h-choke  { top: 27%; left: 43%; width: 5%; height: 5%; }
        #h-usb    { top: 85%; left: 47%; width: 12%; height: 4%; }
    </style>
</head>
<body>

    <div id="radar">Radar: Passe o mouse na placa</div>

    <div class="header">
        <h1>Anatomia de Hardware [Nível Total]</h1>
        <p>Estudo dissecado de componentes e arquitetura</p>
    </div>

    <div class="controls">
        <label class="btn-action">
            📁 CARREGAR FOTO DA PLACA
            <input type="file" id="loader" style="display: none;" accept="image/*">
        </label>
        <button class="btn-action" style="background: var(--highlight);" onclick="resetZoom()">🔍 VISÃO GLOBAL</button>
    </div>

    <div class="main-container">
        <div class="viewport" id="viewport">
            <div class="placeholder" id="hint">⚠️ Aguardando carregamento da imagem...</div>
            
            <div class="board-wrapper" id="wrapper">
                <img id="view-img" class="board-img" src="">
                
                <div id="h-cpu" class="hotspot" onclick="explore('cpu', event)"></div>
                <div id="h-ram" class="hotspot" onclick="explore('ram', event)"></div>
                <div id="h-atx" class="hotspot" onclick="explore('atx', event)"></div>
                <div id="h-chip" class="hotspot" onclick="explore('chip', event)"></div>
                <div id="h-pcie" class="hotspot" onclick="explore('pcie', event)"></div>
                <div id="h-pci" class="hotspot" onclick="explore('pci', event)"></div>
                <div id="h-bat" class="hotspot" onclick="explore('bat', event)"></div>
                <div id="h-sata" class="hotspot" onclick="explore('sata', event)"></div>
                <div id="h-io" class="hotspot" onclick="explore('io', event)"></div>
                <div id="h-cpupwr" class="hotspot" onclick="explore('cpupwr', event)"></div>
                <div id="h-ide" class="hotspot" onclick="explore('ide', event)"></div>
                <div id="h-caps" class="hotspot" onclick="explore('caps', event)"></div>
                <div id="h-traces" class="hotspot" onclick="explore('traces', event)"></div>
                <div id="h-front" class="hotspot" onclick="explore('front', event)"></div>
                <div id="h-choke" class="hotspot" onclick="explore('choke', event)"></div>
                <div id="h-usb" class="hotspot" onclick="explore('usb', event)"></div>
            </div>

            <div class="tooltip" id="tooltip">
                <h2 id="t-name">Componente</h2>
                <div class="section">
                    <span class="label">O que é e o que faz?</span>
                    <p id="t-func"></p>
                </div>
                <div class="section curiosity">
                    <span class="label">Curiosidade de Aula 💡</span>
                    <p id="t-curio"></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const wrapper = document.getElementById('wrapper');
        const radar = document.getElementById('radar');
        
        wrapper.addEventListener('mousemove', function(e) {
            const rect = wrapper.getBoundingClientRect();
            const x = ((e.clientX - rect.left) / rect.width) * 100;
            const y = ((e.clientY - rect.top) / rect.height) * 100;
            
            if (wrapper.style.transform === "" || wrapper.style.transform === "scale(1)") {
                radar.innerHTML = `Mapeamento<br>left: ${x.toFixed(1)}%<br>top: ${y.toFixed(1)}%`;
            }
        });

        const loader = document.getElementById('loader');
        loader.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    document.getElementById('view-img').src = ev.target.result;
                    document.getElementById('wrapper').classList.add('ready');
                    document.getElementById('hint').style.display = 'none';
                };
                reader.readAsDataURL(file);
            }
        });

        const data = {
            cpu: { name: "Socket do Processador", func: "O 'trono' do cérebro do PC. É onde o processador se encaixa para conversar com todas as outras peças.", curio: "Os pinos prateados que você vê no fundo são banhados a ouro real!" },
            ram: { name: "Slots de Memória RAM", func: "A 'mesa de trabalho'. É aqui que o PC guarda o que você está usando AGORA.", curio: "As cores laranjas indicam o 'Dual Channel'." },
            atx: { name: "Conector de Força", func: "A 'boca' da placa-mãe. É por onde a comida (eletricidade) da fonte chega.", curio: "Cada fio colorido que encaixa aqui traz uma 'voltagem' diferente." },
            chip: { name: "Chipset (Southbridge)", func: "O 'Gerente'. Ele cuida das tarefas chatas (USB, Teclado, HD).", curio: "Aquele chip preto da Intel esquenta tanto que usa um 'chapéu' de alumínio." },
            pcie: { name: "Slot PCI Express x16", func: "A 'Pista de Corrida'. É o caminho mais rápido da placa, usado para as Placas de Vídeo.", curio: "Essa pista é serial. Ela manda dados em altíssima velocidade." },
            pci: { name: "Slot PCI Tradicional", func: "Uma 'estrada antiga'. Servia para colocar placas de som ou internet no passado.", curio: "Esse barramento é 'paralelo'. Ele tenta mandar vários dados ao mesmo tempo." },
            bat: { name: "Bateria CMOS", func: "O 'Relógio de Pulso'. Mantém a hora e a data certas.", curio: "Se ela acabar, seu PC vai achar que ainda está no ano de 2005 toda vez que ligar!" },
            sata: { name: "Portas SATA", func: "A 'Entrada do Arquivo'. É por aqui que os arquivos saem do HD.", curio: "O SATA permite que você conecte um HD com o PC ligado (Hot Swap)." },
            io: { name: "Painel Traseiro (E/S)", func: "A 'Fronteira'. É onde o mundo externo se conecta com a placa.", curio: "Cada cor ali tem um sentido: azul é vídeo, as outras são áudio e rede." },
            cpupwr: { name: "Energia da CPU", func: "O 'Lanche VIP'. O processador precisa de um cabo só para ele.", curio: "Se você esquecer de ligar, o PC liga as ventoinhas mas a tela fica preta!" },
            ide: { name: "Conector IDE", func: "O 'Tataravô' do SATA. Usava cabos fita largos.", curio: "Ótimo para recuperar arquivos de PCs de 15 anos atrás." },
            caps: { name: "Capacitores", func: "As 'Caixas d'Água'. Guardam energia e soltam devagarinho.", curio: "Se esses cilindrinhos 'estufarem' ou vazarem, a placa-mãe morre." },
            traces: { name: "Trilhas de Circuito", func: "As 'Ruas de Cobre'. Fios achatados que levam os dados entre as peças.", curio: "Feitas de cobre puro e cobertas por verniz azul para não enferrujarem." },
            front: { name: "Painel Frontal", func: "O 'Botão de Ignição'. Ligamos os fios que vão para o botão do gabinete.", curio: "Se errar a posição por 1 milímetro, o PC não liga!" },
            choke: { name: "Indutores (Bobinas)", func: "Os 'Filtros de Linha'. Limpam a sujeira elétrica da energia.", curio: "Eles transformam a energia da tomada numa energia silenciosa." },
            usb: { name: "Cabeçalhos USB", func: "O 'Extensor'. Liga aquelas portas USB da frente do gabinete.", curio: "Cada porta USB amarela consegue alimentar um celular de forma independente." }
        };

        // Note que agora o JavaScript também calcula o zoom baseado em onde você clicou
        function explore(id, event) {
            const wrap = document.getElementById('wrapper');
            const tooltip = document.getElementById('tooltip');
            const viewport = document.getElementById('viewport');
            const radarBox = document.getElementById('radar');
            
            radarBox.style.opacity = '0.3'; 

            // Zoom automático exato onde você clicou
            const rect = wrap.getBoundingClientRect();
            const clickPercentX = ((event.clientX - rect.left) / rect.width) * 100;
            const clickPercentY = ((event.clientY - rect.top) / rect.height) * 100;

            wrap.style.transformOrigin = `${clickPercentX}% ${clickPercentY}%`;
            wrap.style.transform = "scale(2.3)";
            
            const item = data[id];
            document.getElementById('t-name').innerText = item.name;
            document.getElementById('t-func').innerText = item.func;
            document.getElementById('t-curio').innerText = item.curio;
            
            const vpRect = viewport.getBoundingClientRect();
            let clickX = event.clientX - vpRect.left;
            let clickY = event.clientY - vpRect.top;

            tooltip.style.display = 'block';
            
            const tooltipWidth = tooltip.offsetWidth;
            const tooltipHeight = tooltip.offsetHeight;
            const vpWidth = viewport.offsetWidth;

            if (clickY - tooltipHeight < 20) {
                tooltip.classList.add('bottom-arrow');
                tooltip.style.top = (clickY + 15) + 'px';
            } else {
                tooltip.classList.remove('bottom-arrow');
                tooltip.style.top = (clickY - 15) + 'px';
            }

            let leftPos = clickX - (tooltipWidth / 2); 
            let arrowPos = 50; 

            if (leftPos < 20) {
                leftPos = 20; 
                arrowPos = ((clickX - leftPos) / tooltipWidth) * 100; 
            } 
            else if (leftPos + tooltipWidth > vpWidth - 20) {
                leftPos = vpWidth - tooltipWidth - 20; 
                arrowPos = ((clickX - leftPos) / tooltipWidth) * 100;
            }

            arrowPos = Math.max(8, Math.min(92, arrowPos));

            tooltip.style.left = leftPos + 'px';
            tooltip.style.setProperty('--arrow-pos', arrowPos + '%');

            document.querySelectorAll('.hotspot').forEach(h => h.classList.remove('active'));
            document.getElementById('h-'+id).classList.add('active');
        }

        function resetZoom() {
            const wrap = document.getElementById('wrapper');
            const tooltip = document.getElementById('tooltip');
            const radarBox = document.getElementById('radar');
            
            wrap.style.transform = "scale(1)";
            tooltip.style.display = 'none';
            radarBox.style.opacity = '1';
            
            document.querySelectorAll('.hotspot').forEach(h => h.classList.remove('active'));
        }
    </script>
</body>
</html>
